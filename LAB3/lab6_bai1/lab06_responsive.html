<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
        }
        .topnav{
            display: flex;
            background-color: aquamarine;
            position:relative;
        }
        .topnav a{
            color:black;
            text-decoration: none;
            padding: 14px 20px;
        }
        .topnav a:hover{
            background-color: cadetblue;
            font-weight: bolder;
            color:rebeccapurple
        }
        .icon{
            display: none;
        }
        @media screen and (max-width: 576px){
            .topnav{
                justify-content: space-between;
            }
            .topnav a:not(:first-child){
                display: none;
            }
            .icon{
                display: block;
                font-size: 25px;
                cursor: pointer;
            }
            .topnav.responsive{
                flex-direction:column;
            }
            .topnav.responsive a{
                display:block;
            }
            .topnav.responsive .icon{
                position:absolute;
                right:0;
                top:0;
            }
        }
    </style>
</head>
<body>
    <div class="topnav" id="myTopnav">
    <a href="#">Home</a>
    <a href="#">News</a>
    <a href="#">Contact</a>
    <a href="#">About</a>
    <button class="icon" onclick="myFunction()">&#9776</i></button>
    <script src="Bai_2_Minh_hoa_layout/js/main.js"></script>
    </div>
</body>
</html>
